name: Deploy Site

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 20

      - name: Resolve version from VERSION file (falls back to git tag)
        id: version
        run: |
          if [ -f VERSION ]; then
            TAG="v$(cat VERSION | tr -d '[:space:]')"
          else
            TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo 'v0.0.0')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $TAG"

      - name: Write version data for Eleventy
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "{\"version\":\"$TAG\",\"version_tag\":\"$TAG\"}" > site/_data/site.json

      - name: Copy diary entries and generate manifest
        run: |
          mkdir -p site/satsuma-diaries/content
          cp -rf satsuma-diaries/. site/satsuma-diaries/
          python3 scripts/generate-diary-manifest.py

      # ── "Try it Live!" playground (feature 33) ──────────────────────────
      # The playground is a server-free static bundle built from the viz
      # harness. It is copied into site/playground/ BEFORE the Eleventy
      # build, which passes it through as-is (see site/.eleventy.js), so it
      # publishes at <pages-url>/playground/. Every asset in the bundle is
      # page-relative, so the non-root base path needs no extra config.
      - name: Install tooling packages (playground build)
        run: npm run ci:all

      - name: Build tree-sitter WASM (the playground's in-browser parser)
        working-directory: tooling/tree-sitter-satsuma
        run: node_modules/.bin/tree-sitter build --wasm . -o tree-sitter-satsuma.wasm

      - name: Build the playground bundle and copy it into the site
        run: |
          npm --prefix tooling/satsuma-viz-harness run build:playground
          mkdir -p site/playground
          cp -rf tooling/satsuma-viz-harness/dist/playground/. site/playground/

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build site with Eleventy
        run: cd site && npx @11ty/eleventy

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site/_site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
