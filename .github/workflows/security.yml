name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: # Allow release.yml to invoke this as a gate

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Parse allowlist
        id: allowlist
        run: |
          python3 scripts/parse-security-allowlist.py npm-audit > /tmp/npm-allowlist.txt
          echo "ids=$(cat /tmp/npm-allowlist.txt)" >> "$GITHUB_OUTPUT"

      - name: Audit all packages
        # npm audit reads package-lock.json directly (no install needed), so the
        # loop discovers every tracked lockfile instead of maintaining a
        # hardcoded directory list — new packages are covered automatically
        # without anyone remembering to edit this workflow (sl-qpbx).
        run: |
          set +e
          failed=0
          for lockfile in $(git ls-files '*package-lock.json'); do
            dir=$(dirname "$lockfile")
            echo "::group::npm audit — $dir"
            cd "$GITHUB_WORKSPACE/$dir"
            npm audit --omit=dev --audit-level=high 2>&1
            status=$?
            if [ $status -ne 0 ]; then
              echo "::warning::Audit issues found in $dir"
              failed=1
            fi
            echo "::endgroup::"
          done
          if [ $failed -ne 0 ]; then
            echo "::error::npm audit found high/critical vulnerabilities. Add to .security-allowlist.yml if acknowledged."
            exit 1
          fi

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v7

      - name: Parse allowlist
        id: allowlist
        run: |
          python3 scripts/parse-security-allowlist.py semgrep > /tmp/semgrep-allowlist.txt
          echo "ids=$(cat /tmp/semgrep-allowlist.txt)" >> "$GITHUB_OUTPUT"

      - name: Run Semgrep
        shell: bash
        run: |
          EXCLUDE_ARGS=""
          ALLOWLISTED="${{ steps.allowlist.outputs.ids }}"
          if [ -n "$ALLOWLISTED" ]; then
            IFS=',' read -ra RULES <<< "$ALLOWLISTED"
            for rule in "${RULES[@]}"; do
              if [ -n "$rule" ]; then
                EXCLUDE_ARGS="$EXCLUDE_ARGS --exclude-rule $rule"
              fi
            done
          fi

          semgrep scan \
            --config auto \
            --error \
            --severity ERROR \
            --severity WARNING \
            $EXCLUDE_ARGS

      - name: Generate SARIF
        if: always()
        shell: bash
        run: |
          semgrep scan \
            --config auto \
            --severity ERROR \
            --severity WARNING \
            --sarif --sarif-output semgrep-results.sarif || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true # Only works if GitHub Advanced Security is enabled
